<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#f8faff,#fffbeb);min-height:100vh}
        .card{background:white;border-radius:20px;padding:24px;border:1px solid #f1f5f9}
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <img src="https://aasatecnologia.com.br/logo.png" class="w-16 h-16 mx-auto mb-4 rounded-xl">
            <h1 class="text-3xl font-serif font-bold" style="color:#1a237e">Meu Portal</h1>
            <p class="text-gray-500">Bem-vindo, <span id="nomeMembro">membro</span>!</p>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="card text-center cursor-pointer hover:shadow-lg transition-all" onclick="alert('Em breve')">
                <i data-lucide="receipt" class="w-10 h-10 mx-auto mb-3 text-indigo-600"></i>
                <h3 class="font-bold">Meus Recibos</h3>
                <p class="text-xs text-gray-400">Visualize suas contribuições</p>
            </div>
            <div class="card text-center cursor-pointer hover:shadow-lg transition-all" onclick="alert('Em breve')">
                <i data-lucide="calendar" class="w-10 h-10 mx-auto mb-3 text-green-600"></i>
                <h3 class="font-bold">Eventos</h3>
                <p class="text-xs text-gray-400">Eventos inscritos</p>
            </div>
            <div class="card text-center cursor-pointer hover:shadow-lg transition-all" onclick="alert('Em breve')">
                <i data-lucide="scroll-text" class="w-10 h-10 mx-auto mb-3 text-amber-600"></i>
                <h3 class="font-bold">Certificados</h3>
                <p class="text-xs text-gray-400">Seus certificados</p>
            </div>
            <div class="card text-center cursor-pointer hover:shadow-lg transition-all" onclick="alert('Em breve')">
                <i data-lucide="user" class="w-10 h-10 mx-auto mb-3 text-purple-600"></i>
                <h3 class="font-bold">Meus Dados</h3>
                <p class="text-xs text-gray-400">Atualizar cadastro</p>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
