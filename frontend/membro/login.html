<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Membro - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a237e,#0d1542);overflow:hidden}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .animate-float{animation:float 6s ease-in-out infinite}
        .card-login{background:rgba(255,255,255,.95);border-radius:24px;padding:40px;width:90%;max-width:420px;box-shadow:0 30px 60px rgba(0,0,0,.3)}
        input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:14px;font-size:14px;font-family:'Inter',sans-serif;transition:all .2s}
        input:focus{outline:none;border-color:#1a237e;box-shadow:0 0 0 4px rgba(26,35,126,.08)}
        .btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#1a237e,#283593);color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,35,126,.4)}
    </style>
</head>
<body>
    <div class="card-login animate-float">
        <div class="text-center mb-8">
            <img src="https://aasatecnologia.com.br/logo.png" class="w-16 h-16 mx-auto mb-4 rounded-xl" onerror="this.style.display='none'">
            <h1 class="text-2xl font-serif font-bold" style="color:#1a237e">Portal do Membro</h1>
            <p class="text-sm text-gray-500 mt-1">Acesse sua área exclusiva</p>
        </div>
        
        <form id="loginForm">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" onkeyup="mascaraCPF(this)" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Data de Nascimento</label>
                    <input type="date" id="data_nascimento" required>
                </div>
            </div>
            
            <button type="submit" class="btn-primary mt-6">🔐 Entrar no Portal</button>
        </form>
        
        <p class="text-center text-xs text-gray-400 mt-4">AASA SAGRADO • v3.0</p>
    </div>
<script src="../assets/js/config.js"></script>
<script>
    const API = window.API_URL || 'http://localhost:3001/api';
    
    function mascaraCPF(input) {
        let v = input.value.replace(/\D/g, '').slice(0, 11);
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = v;
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const cpf = document.getElementById('cpf').value;
        const data_nascimento = document.getElementById('data_nascimento').value;
        
        if (!cpf || cpf.replace(/\D/g,'').length < 11) {
            Swal.fire({icon:'error',title:'CPF inválido',text:'Digite um CPF válido.'});
            return;
        }
        if (!data_nascimento) {
            Swal.fire({icon:'error',title:'Data obrigatória',text:'Informe sua data de nascimento.'});
            return;
        }
        
        try {
            // Usar a rota PÚBLICA de login do membro
            const res = await fetch(`${API}/membros/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cpf, data_nascimento})
            });
            
            const data = await res.json();
            
            if (res.ok && data.membro) {
                localStorage.setItem('membro_data', JSON.stringify(data.membro));
                localStorage.setItem('membro_token', data.token);
                Swal.fire({icon:'success',title:'Bem-vindo!',text:`Olá, ${data.membro.nome?.split(' ')[0]}!`,timer:1500,showConfirmButton:false});
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } else {
                Swal.fire({icon:'error',title:'Dados inválidos',text:data.error||'CPF ou data de nascimento incorretos.'});
            }
        } catch (e) {
            console.error('Erro:', e);
            Swal.fire({icon:'error',title:'Erro de conexão',text:'Não foi possível conectar.'});
        }
    });
</script>
   
</body>
</html>
