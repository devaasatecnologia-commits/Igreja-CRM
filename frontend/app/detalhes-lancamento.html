<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Lançamento - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b;--success:#10b981;--danger:#ef4444}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:24px;border:1px solid #f1f5f9;transition:all .3s}
        .card-premium:hover{box-shadow:0 15px 30px rgba(0,0,0,.05)}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9}
        .info-row:last-child{border-bottom:none}
        .info-label{font-size:12px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
        .info-value{font-size:14px;font-weight:500;color:#1e293b}
        .badge-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
        .valor-grande{font-size:28px;font-weight:700}
    </style>
</head>
<body class="font-sans">

    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center gap-4">
                    <button onclick="history.back()" class="btn-premium bg-white border text-gray-600 px-3 py-2"><i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar</button>
                    <div>
                        <h1 class="text-xl lg:text-2xl font-serif font-bold" style="color:var(--primary)" id="descricaoLancamento">Carregando...</h1>
                        <p class="text-xs lg:text-sm" style="color:var(--gold)" id="tipoLancamento"></p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="editarLancamento()" class="btn-premium bg-blue-50 text-blue-700"><i data-lucide="pencil" class="w-4 h-4"></i> Editar</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">
                
                <div class="card-premium animate-slide">
                    <div class="text-center mb-6">
                        <p class="text-sm text-gray-500">Valor</p>
                        <div class="valor-grande" id="valorLancamento" style="color:var(--success)">R$ 0,00</div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><p class="info-label">Descrição</p><p class="info-value" id="descricaoLancamentoInfo">-</p></div>
                        <div><p class="info-label">Tipo</p><p class="info-value" id="tipoLancamentoInfo">-</p></div>
                        <div><p class="info-label">Data de Vencimento</p><p class="info-value" id="vencimentoLancamento">-</p></div>
                        <div><p class="info-label">Data de Pagamento</p><p class="info-value" id="pagamentoLancamento">-</p></div>
                        <div><p class="info-label">Status</p><p class="info-value" id="statusLancamentoInfo">-</p></div>
                        <div><p class="info-label">Membro</p><p class="info-value" id="membroLancamento">-</p></div>
                        <div class="md:col-span-2"><p class="info-label">Observação</p><p class="info-value" id="obsLancamento">-</p></div>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lancamentoId = urlParams.get('id');
        let lancamentoData = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.api || !window.api.isAuthenticated()) { window.location.href = '../login.html'; return; }
            if (!lancamentoId) { window.location.href = 'financeiro.html'; return; }
            
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
            await carregarLancamento();
        });
        
        async function carregarLancamento() {
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/financeiro/lancamentos/${lancamentoId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (!response.ok) throw new Error('Erro ao carregar lançamento');
                
                const data = await response.json();
                lancamentoData = data.data || data;
                
                if (!lancamentoData) {
                    document.getElementById('descricaoLancamento').textContent = 'Lançamento não encontrado';
                    return;
                }
                
                const isReceita = lancamentoData.tipo === 'RECEBER';
                const valor = parseFloat(lancamentoData.valor) || 0;
                
                document.getElementById('descricaoLancamento').textContent = lancamentoData.descricao || 'Sem descrição';
                document.getElementById('descricaoLancamentoInfo').textContent = lancamentoData.descricao || '-';
                document.getElementById('tipoLancamento').textContent = isReceita ? '💰 Receita' : '💸 Despesa';
                document.getElementById('tipoLancamentoInfo').textContent = lancamentoData.tipo || '-';
                
                const valorElement = document.getElementById('valorLancamento');
                valorElement.textContent = Utils.formatMoney(valor);
                valorElement.style.color = isReceita ? '#10b981' : '#ef4444';
                
                document.getElementById('vencimentoLancamento').textContent = lancamentoData.data_vencimento ? Utils.formatDate(lancamentoData.data_vencimento) : '-';
                document.getElementById('pagamentoLancamento').textContent = lancamentoData.data_pagamento ? Utils.formatDate(lancamentoData.data_pagamento) : 'Não pago';
                document.getElementById('membroLancamento').textContent = lancamentoData.membro_nome || 'Não vinculado';
                document.getElementById('obsLancamento').textContent = lancamentoData.observacao || 'Nenhuma observação';
                
                const statusClass = lancamentoData.status === 'PAGO' ? 'bg-green-100 text-green-700' : 
                                   lancamentoData.status === 'VENCIDO' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
                document.getElementById('statusLancamentoInfo').innerHTML = `<span class="badge-status ${statusClass}">${lancamentoData.status || 'N/A'}</span>`;
                
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('descricaoLancamento').textContent = 'Erro ao carregar';
            }
        }
        
        function editarLancamento() {
            alert(`✏️ Função de edição em desenvolvimento para o lançamento ID: ${lancamentoId}`);
        }
    </script>
</body>
</html>
