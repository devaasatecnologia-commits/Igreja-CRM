<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:22px;border:1px solid #f1f5f9;transition:all .3s}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
    </style>
</head>
<body class="font-sans">

    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-xl lg:text-3xl font-serif font-bold flex items-center gap-2 lg:gap-3" style="color:var(--primary)">
                        <i data-lucide="shopping-cart" class="w-6 h-6 lg:w-8 lg:h-8"></i> Vendas
                    </h1>
                    <p class="text-xs lg:text-sm mt-1 font-medium" style="color:var(--gold)">Gerencie produtos e vendas</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="abrirModal()" class="btn-premium text-white" style="background:linear-gradient(135deg,#1a237e,#283593)"><i data-lucide="plus-circle" class="w-4 h-4"></i> Nova Venda</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">

                <!-- STATS -->
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 lg:gap-4">
                    <div class="card-premium animate-slide">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(26,35,126,.1)"><i data-lucide="shopping-bag" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#1a237e"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold" style="color:var(--primary)" id="statTotal">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Total de Vendas</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.1s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.1)"><i data-lucide="check-circle" class="w-4 h-4 lg:w-5 lg:h-5 text-green-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-green-600" id="statPagos">R$ 0,00</div>
                        <div class="text-xs lg:text-sm text-gray-500">Valor Recebido</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.2s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(245,158,11,.1)"><i data-lucide="clock" class="w-4 h-4 lg:w-5 lg:h-5 text-amber-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-amber-600" id="statPendentes">R$ 0,00</div>
                        <div class="text-xs lg:text-sm text-gray-500">Pendentes</div>
                    </div>
                </div>

                <!-- TABELA -->
                <div class="card-premium" style="padding:0;overflow:hidden;cursor:default">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="bg-gray-50"><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Venda</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden md:table-cell">Data</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Total</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden sm:table-cell">Cliente</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Status</th></tr></thead>
                            <tbody><tr><td colspan="5" class="text-center py-12 text-gray-400"><i data-lucide="shopping-bag" class="w-8 h-8 mx-auto mb-3 opacity-30"></i> Nenhuma venda registrada</td></tr></tbody>
                        </table>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.api || !window.api.isAuthenticated()) { window.location.href = '../login.html'; return; }
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
        });
        
        function abrirModal() {
            alert('✏️ Função de cadastro em desenvolvimento');
        }
    </script>
</body>
</html>
