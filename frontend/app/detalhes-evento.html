<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Evento - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:24px;border:1px solid #f1f5f9;transition:all .3s}
        .card-premium:hover{box-shadow:0 15px 30px rgba(0,0,0,.05)}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9}
        .info-row:last-child{border-bottom:none}
        .info-label{font-size:12px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
        .info-value{font-size:14px;font-weight:500;color:#1e293b}
        .badge-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
        .evento-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600}
    </style>
</head>
<body class="font-sans">

    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center gap-4">
                    <button onclick="history.back()" class="btn-premium bg-white border text-gray-600 px-3 py-2"><i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar</button>
                    <div>
                        <h1 class="text-xl lg:text-2xl font-serif font-bold" style="color:var(--primary)" id="tituloEvento">Carregando...</h1>
                        <p class="text-xs lg:text-sm" style="color:var(--gold)" id="tipoEvento"></p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="editarEvento()" class="btn-premium bg-blue-50 text-blue-700"><i data-lucide="pencil" class="w-4 h-4"></i> Editar</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">
                
                <div class="card-premium animate-slide">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="evento-tag" style="background:#1a237e20;color:#1a237e" id="tipoTag">EVENTO</div>
                        <div class="evento-tag" style="background:#f59e0b20;color:#f59e0b" id="statusTag">AGENDADO</div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><p class="info-label">Título</p><p class="info-value" id="tituloEventoInfo">-</p></div>
                        <div><p class="info-label">Tipo</p><p class="info-value" id="tipoEventoInfo">-</p></div>
                        <div><p class="info-label">Data de Início</p><p class="info-value" id="dataInicioEvento">-</p></div>
                        <div><p class="info-label">Data de Término</p><p class="info-value" id="dataFimEvento">-</p></div>
                        <div><p class="info-label">Local</p><p class="info-value" id="localEvento">-</p></div>
                        <div><p class="info-label">Capacidade</p><p class="info-value" id="capacidadeEvento">-</p></div>
                        <div class="md:col-span-2"><p class="info-label">Descrição</p><p class="info-value" id="descricaoEvento">-</p></div>
                        <div class="md:col-span-2"><p class="info-label">Status</p><p class="info-value" id="statusEventoInfo">-</p></div>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventoId = urlParams.get('id');
        let eventoData = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.api || !window.api.isAuthenticated()) { window.location.href = '../login.html'; return; }
            if (!eventoId) { window.location.href = 'agenda.html'; return; }
            
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
            await carregarEvento();
        });
        
        async function carregarEvento() {
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/agendamentos/${eventoId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (!response.ok) throw new Error('Erro ao carregar evento');
                
                const data = await response.json();
                eventoData = data.data;
                
                if (!eventoData) {
                    document.getElementById('tituloEvento').textContent = 'Evento não encontrado';
                    return;
                }
                
                const cores = {
                    CULTO: '#1a237e',
                    REUNIAO: '#f59e0b',
                    EVENTO: '#10b981',
                    CIRCULO_ORACAO: '#8b5cf6',
                    ENSAIO: '#3b82f6'
                };
                const cor = cores[eventoData.tipo] || '#6366f1';
                
                document.getElementById('tituloEvento').textContent = eventoData.titulo || 'Sem título';
                document.getElementById('tituloEventoInfo').textContent = eventoData.titulo || '-';
                document.getElementById('tipoEvento').textContent = eventoData.tipo || 'OUTRO';
                document.getElementById('tipoEventoInfo').textContent = eventoData.tipo || '-';
                document.getElementById('tipoTag').textContent = eventoData.tipo || 'EVENTO';
                document.getElementById('tipoTag').style.background = `${cor}20`;
                document.getElementById('tipoTag').style.color = cor;
                
                document.getElementById('dataInicioEvento').textContent = eventoData.data_inicio ? Utils.formatDateTime(eventoData.data_inicio) : '-';
                document.getElementById('dataFimEvento').textContent = eventoData.data_fim ? Utils.formatDateTime(eventoData.data_fim) : '-';
                document.getElementById('localEvento').textContent = eventoData.local_evento || 'Não definido';
                document.getElementById('capacidadeEvento').textContent = eventoData.capacidade || 'Ilimitada';
                document.getElementById('descricaoEvento').textContent = eventoData.descricao || 'Sem descrição';
                
                document.getElementById('statusEventoInfo').innerHTML = `<span class="badge-status ${eventoData.status === 'AGENDADO' ? 'bg-green-100 text-green-700' : eventoData.status === 'CANCELADO' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">${eventoData.status || 'N/A'}</span>`;
                document.getElementById('statusTag').textContent = eventoData.status || 'AGENDADO';
                
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('tituloEvento').textContent = 'Erro ao carregar';
            }
        }
        
        function editarEvento() {
            alert(`✏️ Função de edição em desenvolvimento para o evento ID: ${eventoId}`);
        }
    </script>
</body>
</html>
