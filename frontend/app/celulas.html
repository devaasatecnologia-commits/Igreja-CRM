<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Células - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b;--success:#10b981;--danger:#ef4444}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:22px;border:1px solid #f1f5f9;transition:all .3s;cursor:pointer}
        .card-premium:hover{box-shadow:0 15px 30px rgba(0,0,0,.06);transform:translateY(-3px)}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
        .tab-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#f1f5f9;color:#64748b;transition:all .2s}
        .tab-btn.active{background:#1a237e;color:white}
        .input-premium{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;font-family:'Inter',sans-serif;background:#f8fafc;transition:all .2s}
        .input-premium:focus{outline:none;border-color:#1a237e;box-shadow:0 0 0 3px rgba(26,35,126,.08);background:white}
    </style>
</head>
<body class="font-sans">

    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-xl lg:text-3xl font-serif font-bold flex items-center gap-2 lg:gap-3" style="color:var(--primary)">
                        <i data-lucide="user-cog" class="w-6 h-6 lg:w-8 lg:h-8"></i> Células
                    </h1>
                    <p class="text-xs lg:text-sm mt-1 font-medium" style="color:var(--gold)">Gerencie os grupos de célula da sua igreja</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportarCSV()" class="btn-premium btn-sm bg-white border text-gray-600"><i data-lucide="download" class="w-3 h-3"></i> Exportar</button>
                    <button onclick="abrirModal()" class="btn-premium text-white" style="background:linear-gradient(135deg,#1a237e,#283593)"><i data-lucide="plus-circle" class="w-4 h-4"></i> Nova Célula</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">

                <!-- STATS CARDS -->
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 lg:gap-4">
                    <div class="card-premium animate-slide">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(26,35,126,.1)"><i data-lucide="user-cog" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#1a237e"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold" style="color:var(--primary)" id="statTotal">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Total de Células</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.1s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.1)"><i data-lucide="user-check" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#10b981"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-green-600" id="statAtivas">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Células Ativas</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.2s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(139,92,246,.1)"><i data-lucide="crown" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#8b5cf6"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-purple-600" id="statMembros">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Membros em Células</div>
                    </div>
                </div>
                
                <!-- FILTROS -->
                <div class="flex gap-2 flex-wrap">
                    <button class="tab-btn active" onclick="filtrar('')">Todas</button>
                    <button class="tab-btn" onclick="filtrar('ATIVO')">Ativas</button>
                    <button class="tab-btn" onclick="filtrar('INATIVO')">Inativas</button>
                </div>
                
                <!-- BUSCA -->
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nome ou líder..." class="input-premium flex-1" onkeyup="if(event.key==='Enter')carregarCelulas()">
                    <button onclick="carregarCelulas()" class="btn-premium text-white" style="background:var(--primary)"><i data-lucide="search" class="w-4 h-4"></i> Buscar</button>
                </div>
                
                <!-- TABELA -->
                <div class="card-premium" style="padding:0;overflow:hidden;cursor:default">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="bg-gray-50"><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Célula</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden md:table-cell">Líder</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Membros</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden sm:table-cell">Dia/Horário</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Status</th><th class="text-center px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Ações</th></tr></thead>
                            <tbody id="tabelaCelulas"><tr><td colspan="6" class="text-center py-12 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> Carregando...</td></tr></tbody>
                        </table>
                    </div>
                    <div class="flex justify-between items-center px-6 py-3 border-t bg-gray-50 text-sm">
                        <span class="text-gray-500" id="infoPagina"></span>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        let todasCelulas = [];
        let filtroStatus = '';
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.api || !window.api.isAuthenticated()) { window.location.href = '../login.html'; return; }
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
            carregarCelulas();
        });
        
        async function carregarCelulas() {
            const tbody = document.getElementById('tabelaCelulas');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> Carregando...</td></tr>';
            
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/celulas`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (!response.ok) throw new Error('Erro ao carregar células');
                
                const data = await response.json();
                todasCelulas = data.data || [];
                
                if (todasCelulas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-400">Nenhuma célula encontrada</td></tr>';
                    return;
                }
                
                atualizarEstatisticas(todasCelulas);
                renderizarTabela(todasCelulas);
                document.getElementById('infoPagina').textContent = `Total: ${todasCelulas.length} células`;
                
            } catch (error) {
                console.error('Erro:', error);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-red-400">Erro ao carregar dados</td></tr>';
            }
        }
        
        function atualizarEstatisticas(celulas) {
            const total = celulas.length;
            const ativas = celulas.filter(c => c.status === 'ATIVO').length;
            let totalMembros = 0;
            celulas.forEach(c => totalMembros += (c.membros_count || 0));
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAtivas').textContent = ativas;
            document.getElementById('statMembros').textContent = totalMembros;
        }
        
        function renderizarTabela(celulas) {
            const tbody = document.getElementById('tabelaCelulas');
            let html = '';
            
            celulas.forEach((c, i) => {
                const colors = ['#1a237e','#8b5cf6','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899'];
                const colorIndex = i % colors.length;
                const statusClass = c.status === 'ATIVO' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                
                html += `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-3 lg:px-6 py-3">
                        <div class="flex items-center gap-2 lg:gap-3">
                            <div class="w-8 h-8 lg:w-10 lg:h-10 rounded-full flex items-center justify-center text-white font-bold text-xs lg:text-sm shadow" style="background:${colors[colorIndex]}">${c.nome ? c.nome[0] : '?'}</div>
                            <strong class="text-xs lg:text-sm">${c.nome || 'Sem nome'}</strong>
                        </div>
                    </td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600 hidden md:table-cell">${c.lider_nome || 'Não definido'}</td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600"><span class="font-bold">${c.membros_count || 0}</span></td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600 hidden sm:table-cell">${c.dia_semana || '-'} ${c.horario ? 'às ' + c.horario : ''}</td>
                    <td class="px-3 lg:px-6 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}">${c.status || 'N/A'}</span></td>
                    <td class="px-3 lg:px-6 py-3 text-center">
                        <div class="flex gap-1 justify-center">
                            <button onclick="verCelula(${c.id})" class="p-1.5 hover:bg-blue-50 rounded-lg" title="Ver"><i data-lucide="eye" class="w-3.5 h-3.5 text-blue-500"></i></button>
                            <button onclick="editarCelula(${c.id})" class="p-1.5 hover:bg-gray-100 rounded-lg" title="Editar"><i data-lucide="pencil" class="w-3.5 h-3.5 text-gray-500"></i></button>
                            <button onclick="excluirCelula(${c.id})" class="p-1.5 hover:bg-red-50 rounded-lg" title="Excluir"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-red-500"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            lucide.createIcons();
        }
        
        function filtrar(status) {
            filtroStatus = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            let filtrados = todasCelulas;
            if (status) filtrados = filtrados.filter(c => c.status === status);
            renderizarTabela(filtrados);
        }
        
        function verCelula(id) {
            const c = todasCelulas.find(c => c.id === id);
            if (c) {
                alert(`📋 Detalhes da Célula\n\nNome: ${c.nome}\nLíder: ${c.lider_nome || 'Não definido'}\nMembros: ${c.membros_count || 0}\nDia: ${c.dia_semana || '-'}\nHorário: ${c.horario || '-'}\nLocal: ${c.local || 'Não definido'}\nStatus: ${c.status}`);
            }
        }
        
        function editarCelula(id) {
            alert(`✏️ Função de edição em desenvolvimento para a célula ID: ${id}`);
        }
        
        async function excluirCelula(id) {
            const c = todasCelulas.find(c => c.id === id);
            if (!c) return;
            
            if (!confirm(`Tem certeza que deseja excluir "${c.nome}"?`)) return;
            
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/celulas/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (response.ok) {
                    alert('✅ Célula excluída!');
                    await carregarCelulas();
                } else {
                    throw new Error('Erro ao excluir');
                }
            } catch (error) {
                alert('❌ Erro ao excluir célula');
            }
        }
        
        function abrirModal() {
            alert('✏️ Função de cadastro em desenvolvimento');
        }
        
        function exportarCSV() {
            if (todasCelulas.length === 0) {
                alert('Nenhuma célula para exportar');
                return;
            }
            
            let csv = 'Nome,Líder,Membros,Dia,Horário,Local,Status\n';
            todasCelulas.forEach(c => {
                csv += `"${c.nome || ''}","${c.lider_nome || ''}","${c.membros_count || 0}","${c.dia_semana || ''}","${c.horario || ''}","${c.local || ''}","${c.status || ''}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `celulas_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
    </script>
</body>
</html>
