<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:22px;border:1px solid #f1f5f9;transition:all .3s}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
        .tab-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#f1f5f9;color:#64748b;transition:all .2s}
        .tab-btn.active{background:#1a237e;color:white}
        .evento-card{background:white;border-radius:12px;padding:16px;border-left:4px solid var(--primary);margin-bottom:10px;transition:all .3s;cursor:pointer}
        .evento-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateX(4px)}
    </style>
</head>
<body class="font-sans">

    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-xl lg:text-3xl font-serif font-bold flex items-center gap-2 lg:gap-3" style="color:var(--primary)">
                        <i data-lucide="calendar" class="w-6 h-6 lg:w-8 lg:h-8"></i> Agenda
                    </h1>
                    <p class="text-xs lg:text-sm mt-1 font-medium" style="color:var(--gold)">Calendário de eventos da igreja</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="abrirModal()" class="btn-premium text-white" style="background:linear-gradient(135deg,#1a237e,#283593)"><i data-lucide="plus-circle" class="w-4 h-4"></i> Novo Evento</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">

                <!-- STATS -->
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 lg:gap-4">
                    <div class="card-premium animate-slide">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(26,35,126,.1)"><i data-lucide="calendar" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#1a237e"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold" style="color:var(--primary)" id="statTotal">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Total de Eventos</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.1s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.1)"><i data-lucide="check-circle" class="w-4 h-4 lg:w-5 lg:h-5 text-green-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-green-600" id="statAgendados">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Agendados</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.2s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(239,68,68,.1)"><i data-lucide="x-circle" class="w-4 h-4 lg:w-5 lg:h-5 text-red-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-red-600" id="statCancelados">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Cancelados</div>
                    </div>
                </div>

                <!-- FILTROS -->
                <div class="flex gap-2 flex-wrap">
                    <button class="tab-btn active" onclick="filtrar('')">Todos</button>
                    <button class="tab-btn" onclick="filtrar('CULTO')">Cultos</button>
                    <button class="tab-btn" onclick="filtrar('REUNIAO')">Reuniões</button>
                    <button class="tab-btn" onclick="filtrar('EVENTO')">Eventos</button>
                </div>

                <!-- LISTA DE EVENTOS -->
                <div id="listaEventos">
                    <div class="text-center py-12 text-gray-400">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-3"></i>
                        <p>Carregando eventos...</p>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        let todosEventos = [];
        let filtroTipo = '';
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.api || !window.api.isAuthenticated()) { 
                window.location.href = '../login.html'; 
                return; 
            }
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
            carregarEventos();
        });
        
        async function carregarEventos() {
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/agendamentos`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (!response.ok) throw new Error('Erro ao carregar eventos');
                
                const data = await response.json();
                todosEventos = data.data || [];
                
                atualizarEstatisticas(todosEventos);
                renderizarEventos(todosEventos);
                
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('listaEventos').innerHTML = `<div class="text-center py-12 text-red-400">Erro ao carregar dados: ${error.message}</div>`;
            }
        }
        
        function atualizarEstatisticas(eventos) {
            const total = eventos.length;
            const agendados = eventos.filter(e => e.status === 'AGENDADO').length;
            const cancelados = eventos.filter(e => e.status === 'CANCELADO').length;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAgendados').textContent = agendados;
            document.getElementById('statCancelados').textContent = cancelados;
        }
        
        function renderizarEventos(eventos) {
            const container = document.getElementById('listaEventos');
            
            if (eventos.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-400">Nenhum evento encontrado</div>';
                return;
            }
            
            let html = '';
            eventos.forEach(e => {
                const cores = {
                    CULTO: '#1a237e',
                    REUNIAO: '#f59e0b',
                    EVENTO: '#10b981',
                    CIRCULO_ORACAO: '#8b5cf6',
                    ENSAIO: '#3b82f6'
                };
                const cor = cores[e.tipo] || '#6366f1';
                const statusClass = e.status === 'AGENDADO' ? 'bg-green-100 text-green-700' : 
                                   e.status === 'CANCELADO' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
                
                html += `
                <div class="evento-card animate-slide" style="border-left-color:${cor}">
                    <div class="flex justify-between items-start flex-wrap gap-2">
                        <div>
                            <h3 class="font-bold text-sm lg:text-base" style="color:var(--primary)">${e.titulo || 'Sem título'}</h3>
                            <p class="text-xs text-gray-500 mt-1">${e.descricao || 'Sem descrição'}</p>
                            <div class="flex gap-3 mt-2 text-xs text-gray-400">
                                <span><i data-lucide="calendar" class="w-3 h-3 inline"></i> ${Utils.formatDateTime(e.data_inicio)}</span>
                                <span><i data-lucide="map-pin" class="w-3 h-3 inline"></i> ${e.local_evento || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}">${e.status || 'N/A'}</span>
                            <span class="text-xs text-gray-400">${e.tipo || 'OUTRO'}</span>
                        </div>
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
            lucide.createIcons();
        }
        
        function filtrar(tipo) {
            filtroTipo = tipo;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            let filtrados = todosEventos;
            if (tipo) filtrados = filtrados.filter(e => e.tipo === tipo);
            renderizarEventos(filtrados);
        }
        
        function abrirModal() {
            alert('✏️ Função de cadastro em desenvolvimento');
        }
    </script>
</body>
</html>
