<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membros - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    
    <!-- CSS do Sidebar (mesmo do dashboard) -->
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b;--success:#10b981;--danger:#ef4444}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:22px;border:1px solid #f1f5f9;transition:all .3s;cursor:pointer}
        .card-premium:hover{box-shadow:0 15px 30px rgba(0,0,0,.06);transform:translateY(-3px)}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
        .tab-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#f1f5f9;color:#64748b;transition:all .2s}
        .tab-btn.active{background:#1a237e;color:white}
        .input-premium{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:13px;font-family:'Inter',sans-serif;background:#f8fafc;transition:all .2s}
        .input-premium:focus{outline:none;border-color:#1a237e;box-shadow:0 0 0 3px rgba(26,35,126,.08);background:white}
    </style>
</head>
<body class="font-sans">

    <!-- SIDEBAR (mesmo do dashboard) -->
    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-xl lg:text-3xl font-serif font-bold flex items-center gap-2 lg:gap-3" style="color:var(--primary)">
                        <i data-lucide="users" class="w-6 h-6 lg:w-8 lg:h-8"></i> Rebanho
                    </h1>
                    <p class="text-xs lg:text-sm mt-1 font-medium" style="color:var(--gold)">Gerencie os membros da igreja</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportarCSV()" class="btn-premium btn-sm bg-white border text-gray-600"><i data-lucide="download" class="w-3 h-3"></i> Exportar</button>
                    <button onclick="abrirModal()" class="btn-premium text-white" style="background:linear-gradient(135deg,#1a237e,#283593)"><i data-lucide="user-plus" class="w-4 h-4"></i> Novo Membro</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">

                <!-- STATS CARDS -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
                    <div class="card-premium animate-slide">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(26,35,126,.1)"><i data-lucide="users" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#1a237e"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold" style="color:var(--primary)" id="statTotal">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Total de Membros</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.1s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.1)"><i data-lucide="user-check" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#10b981"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-green-600" id="statAtivos">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Ativos</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.2s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(245,158,11,.1)"><i data-lucide="eye" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#f59e0b"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-amber-600" id="statVisitantes">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Visitantes</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.3s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(139,92,246,.1)"><i data-lucide="award" class="w-4 h-4 lg:w-5 lg:h-5" style="color:#8b5cf6"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-purple-600" id="statLideres">0</div>
                        <div class="text-xs lg:text-sm text-gray-500">Líderes</div>
                    </div>
                </div>
                
                <!-- FILTROS RÁPIDOS -->
                <div class="flex gap-2 flex-wrap">
                    <button class="tab-btn active" onclick="filtrarTipo('')">Todos</button>
                    <button class="tab-btn" onclick="filtrarTipo('MEMBRO')">Membros</button>
                    <button class="tab-btn" onclick="filtrarTipo('VISITANTE')">Visitantes</button>
                    <button class="tab-btn" onclick="filtrarTipo('LIDER')">Líderes</button>
                    <button class="tab-btn" onclick="filtrarTipo('PASTOR')">Pastores</button>
                    <button class="tab-btn" onclick="filtrarStatus('INATIVO')">Inativos</button>
                </div>
                
                <!-- BUSCA -->
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nome, email, CPF, celular..." class="input-premium flex-1" onkeyup="if(event.key==='Enter')carregarMembros()">
                    <button onclick="carregarMembros()" class="btn-premium text-white" style="background:var(--primary)"><i data-lucide="search" class="w-4 h-4"></i> Buscar</button>
                </div>
                
                <!-- TABELA -->
                <div class="card-premium" style="padding:0;overflow:hidden;cursor:default">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="bg-gray-50"><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Membro</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden md:table-cell">Email</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden sm:table-cell">Celular</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Tipo</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Status</th><th class="text-center px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Ações</th></tr></thead>
                            <tbody id="tabelaMembros"><tr><td colspan="6" class="text-center py-12 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> Carregando...</td></tr></tbody>
                        </table>
                    </div>
                    <div class="flex justify-between items-center px-6 py-3 border-t bg-gray-50 text-sm">
                        <span class="text-gray-500" id="infoPagina"></span>
                        <div class="flex gap-1" id="paginacao"></div>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <!-- ===== SCRIPTS (MESMO DO DASHBOARD) ===== -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    
    <script>
        // ============ VARIÁVEIS ============
        let paginaAtual = 1, totalPaginas = 1, filtroTipo = '', filtroStatus = '';
        let todosMembros = [];
        
        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.api || !window.api.isAuthenticated()) { 
                window.location.href = '../login.html'; 
                return; 
            }
            
            // O sidebar.js já carrega automaticamente via DOMContentLoaded
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
            carregarMembros();
        });
        
        // ============ CARREGAR MEMBROS ============
        async function carregarMembros() {
            const tbody = document.getElementById('tabelaMembros');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> Carregando...</td></tr>';
            
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/membros`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (!response.ok) throw new Error('Erro ao carregar membros');
                
                const data = await response.json();
                todosMembros = data.data || [];
                
                if (todosMembros.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-400">Nenhum membro encontrado</td></tr>';
                    return;
                }
                
                atualizarEstatisticas(todosMembros);
                renderizarTabela(todosMembros);
                document.getElementById('infoPagina').textContent = `Total: ${todosMembros.length} membros`;
                
            } catch (error) {
                console.error('Erro:', error);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-red-400">Erro ao carregar dados</td></tr>';
            }
        }
        
        // ============ ATUALIZAR ESTATÍSTICAS ============
        function atualizarEstatisticas(membros) {
            const total = membros.length;
            const ativos = membros.filter(m => m.status === 'ATIVO').length;
            const visitantes = membros.filter(m => m.tipo_membro === 'VISITANTE').length;
            const lideres = membros.filter(m => m.tipo_membro === 'LIDER' || m.tipo_membro === 'PASTOR').length;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAtivos').textContent = ativos;
            document.getElementById('statVisitantes').textContent = visitantes;
            document.getElementById('statLideres').textContent = lideres;
        }
        
        // ============ RENDERIZAR TABELA ============
        function renderizarTabela(membros) {
            const tbody = document.getElementById('tabelaMembros');
            let html = '';
            
            membros.forEach((m, i) => {
                const colors = ['#1a237e','#8b5cf6','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6'];
                const colorIndex = i % colors.length;
                const statusClass = m.status === 'ATIVO' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                
                html += `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-3 lg:px-6 py-3">
                        <div class="flex items-center gap-2 lg:gap-3">
                            <div class="w-8 h-8 lg:w-10 lg:h-10 rounded-full flex items-center justify-center text-white font-bold text-xs lg:text-sm shadow" style="background:${colors[colorIndex]}">${m.nome ? m.nome[0] : '?'}</div>
                            <strong class="text-xs lg:text-sm">${m.nome || 'Sem nome'}</strong>
                        </div>
                    </td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600 hidden md:table-cell">${m.email || '-'}</td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600 hidden sm:table-cell">${m.celular || '-'}</td>
                    <td class="px-3 lg:px-6 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-700">${m.tipo_membro || 'N/A'}</span></td>
                    <td class="px-3 lg:px-6 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}">${m.status || 'N/A'}</span></td>
                    <td class="px-3 lg:px-6 py-3 text-center">
                        <div class="flex gap-1 justify-center">
                            <button onclick="verMembro(${m.id})" class="p-1.5 hover:bg-blue-50 rounded-lg" title="Ver"><i data-lucide="eye" class="w-3.5 h-3.5 text-blue-500"></i></button>
                            <button onclick="editarMembro(${m.id})" class="p-1.5 hover:bg-gray-100 rounded-lg" title="Editar"><i data-lucide="pencil" class="w-3.5 h-3.5 text-gray-500"></i></button>
                            <button onclick="excluirMembro(${m.id})" class="p-1.5 hover:bg-red-50 rounded-lg" title="Excluir"><i data-lucide="trash-2" class="w-3.5 h-3.5 text-red-500"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            lucide.createIcons();
        }
        
        // ============ FUNÇÕES DE FILTRO ============
        function filtrarTipo(tipo) {
            filtroTipo = tipo;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            let filtrados = todosMembros;
            if (tipo) filtrados = filtrados.filter(m => m.tipo_membro === tipo);
            renderizarTabela(filtrados);
        }
        
        function filtrarStatus(status) {
            filtroStatus = status;
            let filtrados = todosMembros;
            if (status) filtrados = filtrados.filter(m => m.status === status);
            renderizarTabela(filtrados);
        }
        
        // ============ FUNÇÕES DE AÇÃO ============
        function verMembro(id) {
            const m = todosMembros.find(m => m.id === id);
            if (m) {
                alert(`📋 Detalhes do Membro\n\nNome: ${m.nome}\nEmail: ${m.email || 'Não informado'}\nCelular: ${m.celular || 'Não informado'}\nTipo: ${m.tipo_membro}\nStatus: ${m.status}\nProfissão: ${m.profissao || 'Não informado'}`);
            }
        }
        
        function editarMembro(id) {
            alert(`✏️ Função de edição em desenvolvimento para o membro ID: ${id}`);
        }
        
        async function excluirMembro(id) {
            const m = todosMembros.find(m => m.id === id);
            if (!m) return;
            
            if (!confirm(`Tem certeza que deseja excluir "${m.nome}"?`)) return;
            
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/membros/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (response.ok) {
                    alert('✅ Membro excluído!');
                    await carregarMembros();
                } else {
                    throw new Error('Erro ao excluir');
                }
            } catch (error) {
                alert('❌ Erro ao excluir membro');
            }
        }
        
        function abrirModal() {
            alert('✏️ Função de cadastro em desenvolvimento');
        }
        
        function exportarCSV() {
            if (todosMembros.length === 0) {
                alert('Nenhum membro para exportar');
                return;
            }
            
            let csv = 'Nome,Email,Celular,Tipo,Status\n';
            todosMembros.forEach(m => {
                csv += `"${m.nome || ''}","${m.email || ''}","${m.celular || ''}","${m.tipo_membro || ''}","${m.status || ''}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `membros_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
    </script>
</body>
</html>
