<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - AASA SAGRADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],serif:['Playfair Display','serif']}}}}</script>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <style>
        :root{--primary:#1a237e;--gold:#f59e0b;--success:#10b981;--danger:#ef4444}
        .main-content{margin-left:270px;min-height:100vh;background:linear-gradient(135deg,#f8faff 0%,#fffbeb 30%,#f0f4ff 60%,#fefce8 100%)}
        @media(max-width:768px){.main-content{margin-left:0;padding-top:70px}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .4s ease forwards}
        .card-premium{background:white;border-radius:20px;padding:22px;border:1px solid #f1f5f9;transition:all .3s}
        .btn-premium{padding:10px 22px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .btn-premium:hover{transform:translateY(-1px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
        .btn-sm{padding:6px 12px;font-size:11px;border-radius:8px}
        .tab-btn{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#f1f5f9;color:#64748b;transition:all .2s}
        .tab-btn.active{background:#1a237e;color:white}
    </style>
</head>
<body class="font-sans">

    <div id="sidebar-container"></div>

    <div class="app-layout">
        <main class="main-content">

            <header class="sticky top-0 z-20 px-4 lg:px-8 py-3 lg:py-5 bg-white/85 backdrop-blur-xl border-b flex items-center justify-between flex-wrap gap-3">
                <div>
                    <h1 class="text-xl lg:text-3xl font-serif font-bold flex items-center gap-2 lg:gap-3" style="color:var(--primary)">
                        <i data-lucide="wallet" class="w-6 h-6 lg:w-8 lg:h-8"></i> Financeiro
                    </h1>
                    <p class="text-xs lg:text-sm mt-1 font-medium" style="color:var(--gold)">Controle financeiro completo</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="abrirModal()" class="btn-premium text-white" style="background:linear-gradient(135deg,#1a237e,#283593)"><i data-lucide="plus-circle" class="w-4 h-4"></i> Novo Lançamento</button>
                </div>
            </header>
            
            <div class="p-4 lg:p-8 space-y-4 lg:space-y-6">

                <!-- STATS CARDS -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
                    <div class="card-premium animate-slide">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.1)"><i data-lucide="trending-up" class="w-4 h-4 lg:w-5 lg:h-5 text-green-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-green-600" id="statReceitas">R$ 0,00</div>
                        <div class="text-xs lg:text-sm text-gray-500">Receitas</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.1s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(239,68,68,.1)"><i data-lucide="trending-down" class="w-4 h-4 lg:w-5 lg:h-5 text-red-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-red-600" id="statDespesas">R$ 0,00</div>
                        <div class="text-xs lg:text-sm text-gray-500">Despesas</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.2s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(59,130,246,.1)"><i data-lucide="clock" class="w-4 h-4 lg:w-5 lg:h-5 text-blue-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-blue-600" id="statPendentes">R$ 0,00</div>
                        <div class="text-xs lg:text-sm text-gray-500">Pendentes</div>
                    </div>
                    <div class="card-premium animate-slide" style="animation-delay:.3s">
                        <div class="flex items-center gap-2 mb-2"><div class="w-8 h-8 lg:w-10 lg:h-10 rounded-lg flex items-center justify-center" style="background:rgba(245,158,11,.1)"><i data-lucide="alert-circle" class="w-4 h-4 lg:w-5 lg:h-5 text-amber-600"></i></div></div>
                        <div class="text-xl lg:text-3xl font-extrabold text-amber-600" id="statVencidos">R$ 0,00</div>
                        <div class="text-xs lg:text-sm text-gray-500">Vencidos</div>
                    </div>
                </div>

                <!-- FILTROS -->
                <div class="flex gap-2 flex-wrap">
                    <button class="tab-btn active" onclick="filtrar('')">Todos</button>
                    <button class="tab-btn" onclick="filtrar('RECEBER')">Receitas</button>
                    <button class="tab-btn" onclick="filtrar('PAGAR')">Despesas</button>
                    <button class="tab-btn" onclick="filtrarStatus('PENDENTE')">Pendentes</button>
                    <button class="tab-btn" onclick="filtrarStatus('PAGO')">Pagos</button>
                </div>

                <!-- TABELA -->
                <div class="card-premium" style="padding:0;overflow:hidden;cursor:default">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="bg-gray-50"><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Descrição</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden md:table-cell">Tipo</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Valor</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase hidden sm:table-cell">Vencimento</th><th class="text-left px-3 lg:px-6 py-3 text-xs font-bold text-gray-400 uppercase">Status</th></tr></thead>
                            <tbody id="tabelaLancamentos"><tr><td colspan="5" class="text-center py-12 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> Carregando...</td></tr></tbody>
                        </table>
                    </div>
                </div>
                
            </div>
            <footer class="text-center py-6 text-xs text-gray-400 border-t bg-white/50" id="footerText"></footer>
        </main>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        let todosLancamentos = [];
        let filtroTipo = '';
        let filtroStatus = '';
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.api || !window.api.isAuthenticated()) { window.location.href = '../login.html'; return; }
            document.getElementById('footerText').textContent = `${window.APP_NAME} v3.0 • AASA Tecnologia © 2026`;
            lucide.createIcons();
            carregarLancamentos();
        });
        
        async function carregarLancamentos() {
            const tbody = document.getElementById('tabelaLancamentos');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> Carregando...</td></tr>';
            
            try {
                const token = localStorage.getItem('auth_token');
                const igrejaId = localStorage.getItem('igreja_id') || 1;
                
                const response = await fetch(`${window.API_URL}/financeiro/lancamentos`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-igreja-id': igrejaId
                    }
                });
                
                if (!response.ok) throw new Error('Erro ao carregar lançamentos');
                
                const data = await response.json();
                todosLancamentos = data.lancamentos || [];
                
                if (todosLancamentos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-gray-400">Nenhum lançamento encontrado</td></tr>';
                    return;
                }
                
                atualizarEstatisticas(todosLancamentos);
                renderizarTabela(todosLancamentos);
                
            } catch (error) {
                console.error('Erro:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-12 text-red-400">Erro ao carregar dados</td></tr>';
            }
        }
        
        function atualizarEstatisticas(lancamentos) {
            let totalReceitas = 0, totalDespesas = 0, totalPendentes = 0, totalVencidos = 0;
            
            lancamentos.forEach(l => {
                const valor = parseFloat(l.valor) || 0;
                if (l.tipo === 'RECEBER') {
                    if (l.status === 'PAGO') totalReceitas += valor;
                    else if (l.status === 'PENDENTE') totalPendentes += valor;
                    else if (l.status === 'VENCIDO') totalVencidos += valor;
                } else if (l.tipo === 'PAGAR') {
                    if (l.status === 'PAGO') totalDespesas += valor;
                    else if (l.status === 'PENDENTE') totalPendentes += valor;
                    else if (l.status === 'VENCIDO') totalVencidos += valor;
                }
            });
            
            document.getElementById('statReceitas').textContent = Utils.formatMoney(totalReceitas);
            document.getElementById('statDespesas').textContent = Utils.formatMoney(totalDespesas);
            document.getElementById('statPendentes').textContent = Utils.formatMoney(totalPendentes);
            document.getElementById('statVencidos').textContent = Utils.formatMoney(totalVencidos);
        }
        
        function renderizarTabela(lancamentos) {
            const tbody = document.getElementById('tabelaLancamentos');
            let html = '';
            
            lancamentos.forEach(l => {
                const tipoClass = l.tipo === 'RECEBER' ? 'text-green-600' : 'text-red-600';
                const statusClass = l.status === 'PAGO' ? 'bg-green-100 text-green-700' : 
                                   l.status === 'VENCIDO' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
                
                html += `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-3 lg:px-6 py-3">
                        <strong class="text-xs lg:text-sm">${l.descricao || 'Sem descrição'}</strong>
                        ${l.membro_nome ? `<p class="text-xs text-gray-400">${l.membro_nome}</p>` : ''}
                    </td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600 hidden md:table-cell">${l.tipo || 'N/A'}</td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm font-bold ${tipoClass}">${l.tipo === 'RECEBER' ? '+' : '-'} ${Utils.formatMoney(l.valor)}</td>
                    <td class="px-3 lg:px-6 py-3 text-xs lg:text-sm text-gray-600 hidden sm:table-cell">${Utils.formatDate(l.data_vencimento)}</td>
                    <td class="px-3 lg:px-6 py-3"><span class="px-2 py-1 rounded-full text-xs font-semibold ${statusClass}">${l.status || 'N/A'}</span></td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            lucide.createIcons();
        }
        
        function filtrar(tipo) {
            filtroTipo = tipo;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            aplicarFiltros();
        }
        
        function filtrarStatus(status) {
            filtroStatus = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            aplicarFiltros();
        }
        
        function aplicarFiltros() {
            let filtrados = todosLancamentos;
            if (filtroTipo) filtrados = filtrados.filter(l => l.tipo === filtroTipo);
            if (filtroStatus) filtrados = filtrados.filter(l => l.status === filtroStatus);
            renderizarTabela(filtrados);
        }
        
        function abrirModal() {
            alert('✏️ Função de cadastro em desenvolvimento');
        }
    </script>
</body>
</html>
