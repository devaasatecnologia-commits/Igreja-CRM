<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AASA SAGRADO - Login | Tecnologia abençoada para o seu ministério</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
  :root {
    --primary: #1a237e;
    --primary-dark: #0d1542;
    --primary-light: #283593;
    --accent: #3b82f6;
    --gold: #f59e0b;
}
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            overflow: hidden;
            position: relative;
        }
        
        /* Fundo celestial */
        .celestial-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(74,14,120,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(14,165,233,0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a1a 0%, #0f0720 50%, #0a0a1a 100%);
            z-index: 0;
        }
        
        /* Raios de luz */
        .light-ray {
            position: fixed;
            width: 2px;
            height: 150%;
            background: linear-gradient(180deg, transparent, rgba(245,158,11,0.4), rgba(255,255,255,0.6), rgba(245,158,11,0.4), transparent);
            animation: rayMove 8s ease-in-out infinite;
            z-index: 1;
            opacity: 0.5;
        }
        .light-ray:nth-child(1) { left: 15%; animation-delay: 0s; }
        .light-ray:nth-child(2) { left: 35%; animation-delay: -3s; }
        .light-ray:nth-child(3) { left: 55%; animation-delay: -6s; }
        .light-ray:nth-child(4) { left: 75%; animation-delay: -2s; }
        .light-ray:nth-child(5) { left: 90%; animation-delay: -5s; }
        
        @keyframes rayMove {
            0%, 100% { transform: translateY(-30%) rotate(5deg); opacity: 0.3; }
            50% { transform: translateY(30%) rotate(-5deg); opacity: 0.7; }
        }
        
        /* Partículas douradas */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            animation: particleFloat 6s ease-in-out infinite;
            box-shadow: 0 0 10px var(--gold-light), 0 0 20px var(--gold);
        }
        @keyframes particleFloat {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        
        /* Card Principal */
        .login-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 460px;
        }
        
        .login-card {
            background: rgba(15, 7, 32, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 
                0 0 50px rgba(74, 14, 120, 0.3),
                0 0 100px rgba(245, 158, 11, 0.1),
                inset 0 1px 0 rgba(255,255,255,0.05);
            animation: cardAppear 1s ease;
        }
        
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* Logo AASA */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-img {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            object-fit: contain;
            background: white;
            padding: 10px;
            box-shadow: 0 0 30px rgba(245,158,11,0.3), 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 16px;
            animation: logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(245,158,11,0.3), 0 10px 30px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 50px rgba(245,158,11,0.5), 0 10px 40px rgba(245,158,11,0.2); }
        }
        
        .system-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        
        .system-subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .brand-tag {
            display: inline-block;
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .brand-tag span {
            color: var(--gold-light);
            font-weight: 600;
        }
        
        /* Formulário */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: rgba(245,158,11,0.5);
            box-shadow: 0 0 30px rgba(245,158,11,0.1), 0 0 0 1px rgba(245,158,11,0.3);
            background: rgba(255,255,255,0.05);
        }
        
        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        
        /* Botão */
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #1a237e, #283593, #1a237e);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
            color: white;
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            margin-top: 10px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(74,14,120,0.5), 0 0 60px rgba(245,158,11,0.2);
        }
        
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Alerta */
        .alert {
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            display: block;
        }
        
        .alert-success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7;
            display: block;
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }
        
        .login-footer a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        
        .login-footer a:hover {
            color: var(--gold);
        }
        
        .version {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 11px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- Fundo celestial -->
    <div class="celestial-bg"></div>
    
    <!-- Raios de luz -->
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    
    <!-- Partículas -->
    <div class="particles" id="particlesContainer"></div>
    
    <!-- Login -->
    <div class="login-container">
        <div class="login-card">
            <!-- SUA LOGO AASA -->
            <div class="logo-section">
                <img src="https://aasatecnologia.com.br/logo.png" alt="AASA Tecnologia" class="logo-img" 
                     onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='inline-block';">
                <div id="fallbackLogo" style="display:none; font-size:50px; margin-bottom:16px;">⛪</div>
                <h1 class="system-name">AASA SAGRADO</h1>
                <p class="system-subtitle">Sistema de Gestão para Igrejas</p>
                <div class="brand-tag">by <span>AASA Tecnologia</span></div>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="pastor@igreja.com" value="admin@igreja.com" required>
                </div>
                <div class="form-group">
                    <label>🔐 Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" value="admin123" required>
                </div>
                
                <div id="msg" class="alert"></div>
                
                <button type="submit" class="btn-login" id="btn">
                    🔥 ENTRAR NO SISTEMA
                </button>
            </form>
            
            <div class="login-footer">
                <a href="index.html">← Voltar para o site</a>
            </div>
        </div>
    </div>
    
    <div class="version">AASA SAGRADO v3.0 • Desenvolvido por AASA Tecnologia © 2026</div>

    <script>
        // Criar partículas douradas
        const container = document.getElementById('particlesContainer');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (4 + Math.random() * 8) + 's';
            container.appendChild(particle);
        }
        
        const API = 'http://localhost:3001/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.textContent = '🔥 CONECTANDO...';
            msg.className = 'alert';
            
            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, senha})
                });
                const data = await res.json();
                
                if (res.ok && data.token) {
                    // Salvar dados da igreja (cores, logo, nome)
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    localStorage.setItem('igreja', JSON.stringify(data.igreja));
                    localStorage.setItem('igreja_nome', data.igreja.nome);
                    if (data.igreja.cor_primaria) localStorage.setItem('cor_primaria', data.igreja.cor_primaria);
                    if (data.igreja.cor_secundaria) localStorage.setItem('cor_secundaria', data.igreja.cor_secundaria);
                    if (data.igreja.logo_url) localStorage.setItem('igreja_logo', data.igreja.logo_url);
                    
                    msg.className = 'alert alert-success';
                    msg.textContent = '✅ Acesso concedido! Redirecionando...';
                    setTimeout(() => window.location.href = 'app/dashboard.html', 600);
                } else {
                    msg.className = 'alert alert-error';
                    msg.textContent = '❌ ' + (data.error || 'Credenciais inválidas');
                    btn.disabled = false;
                    btn.textContent = '🔥 ENTRAR NO SISTEMA';
                }
            } catch (err) {
                msg.className = 'alert alert-error';
                msg.textContent = '❌ Erro de conexão com o servidor';
                btn.disabled = false;
                btn.textContent = '🔥 ENTRAR NO SISTEMA';
            }
        });
    </script>
</body>
</html>
