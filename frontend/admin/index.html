<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - CRM Igreja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script>
        tailwind.config = {theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}
    </script>
    <style>
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-slide{animation:slideUp .5s ease forwards}
        .card-hover{transition:all .3s}
        .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.1)}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:20px}
    </style>
</head>
<body class="bg-gray-50 font-sans">
    
    <div class="flex h-screen">
        
        <!-- SIDEBAR -->
        <aside class="w-72 bg-gray-900 text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-lg font-bold">👑</div>
                    <div>
                        <h3 class="font-bold">Super Admin</h3>
                        <span class="text-xs text-gray-400">AASA Tecnologia</span>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-medium text-sm">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 font-medium text-sm">
                    <i data-lucide="building-2" class="w-5 h-5"></i> Igrejas
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 font-medium text-sm">
                    <i data-lucide="users" class="w-5 h-5"></i> Usuários
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 font-medium text-sm">
                    <i data-lucide="credit-card" class="w-5 h-5"></i> Assinaturas
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 font-medium text-sm">
                    <i data-lucide="package" class="w-5 h-5"></i> Planos
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 font-medium text-sm">
                    <i data-lucide="settings" class="w-5 h-5"></i> Configurações
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="flex items-center gap-3 w-full px-4 py-2 rounded-xl text-gray-400 hover:bg-gray-800 text-sm">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Sair
                </button>
            </div>
        </aside>
        
        <!-- MAIN -->
        <main class="flex-1 overflow-y-auto">
            <div class="sticky top-0 bg-white/80 backdrop-blur-xl border-b px-8 py-4 flex items-center justify-between z-10">
                <div>
                    <h1 class="text-2xl font-extrabold text-gray-900">👑 Painel Super Admin</h1>
                    <p class="text-sm text-gray-400">Gerencie todas as igrejas</p>
                </div>
                <span class="px-4 py-2 bg-red-100 text-red-700 rounded-full text-xs font-bold flex items-center gap-2">
                    <i data-lucide="shield-alert" class="w-4 h-4"></i> SUPER ADMIN
                </span>
            </div>
            
            <div class="p-8 space-y-8">
                
                <!-- STATS -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="card-hover bg-white rounded-2xl p-6 border animate-slide" style="animation-delay:.1s">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center"><i data-lucide="building-2" class="w-6 h-6 text-indigo-600"></i></div>
                            <div><div class="text-2xl font-bold" id="totalIgrejas">-</div><div class="text-sm text-gray-400">Total Igrejas</div></div>
                        </div>
                    </div>
                    <div class="card-hover bg-white rounded-2xl p-6 border animate-slide" style="animation-delay:.2s">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center"><i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i></div>
                            <div><div class="text-2xl font-bold" id="igrejasAtivas">-</div><div class="text-sm text-gray-400">Ativas</div></div>
                        </div>
                    </div>
                    <div class="card-hover bg-white rounded-2xl p-6 border animate-slide" style="animation-delay:.3s">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center"><i data-lucide="dollar-sign" class="w-6 h-6 text-amber-600"></i></div>
                            <div><div class="text-2xl font-bold" id="faturamento">-</div><div class="text-sm text-gray-400">MRR</div></div>
                        </div>
                    </div>
                    <div class="card-hover bg-white rounded-2xl p-6 border animate-slide" style="animation-delay:.4s">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center"><i data-lucide="users" class="w-6 h-6 text-blue-600"></i></div>
                            <div><div class="text-2xl font-bold" id="totalMembros">-</div><div class="text-sm text-gray-400">Total Membros</div></div>
                        </div>
                    </div>
                </div>
                
                <!-- TABELA DE IGREJAS -->
                <div class="bg-white rounded-2xl border overflow-hidden">
                    <div class="px-6 py-4 border-b flex justify-between items-center">
                        <h3 class="font-semibold text-gray-900 flex items-center gap-2"><i data-lucide="building-2" class="w-5 h-5 text-indigo-600"></i> Igrejas Cadastradas</h3>
                        <button class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 flex items-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> Nova Igreja
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-400 uppercase">Igreja</th>
                                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-400 uppercase">Plano</th>
                                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-400 uppercase">Membros</th>
                                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-400 uppercase">Status</th>
                                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-400 uppercase">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaIgrejas">
                                <tr><td colspan="5" class="text-center py-8 text-gray-400">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
            </div>
        </main>
    </div>

    <script>
        const API = 'http://localhost:3001/api';
        
        function init() {
            const token = localStorage.getItem('sa_token');
            if (!token) { window.location.href = 'login.html'; return; }
            lucide.createIcons();
            carregarDados();
        }
        
        async function carregarDados() {
            const token = localStorage.getItem('sa_token');
            try {
                const res = await fetch(API + '/superadmin/dashboard', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const d = await res.json();
                
                document.getElementById('totalIgrejas').textContent = d.total_igrejas || 0;
                document.getElementById('igrejasAtivas').textContent = d.igrejas_ativas || 0;
                document.getElementById('faturamento').textContent = 'R$ ' + (Number(d.faturamento_mensal) || 0).toLocaleString('pt-BR');
                document.getElementById('totalMembros').textContent = d.total_membros || 0;
                
                // Buscar lista de igrejas
                const iRes = await fetch(API + '/superadmin/igrejas', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const igrejas = await iRes.json();
                
                let html = '';
                igrejas.forEach(i => {
                    html += `
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 bg-indigo-100 rounded-lg flex items-center justify-center text-lg">⛪</div>
                                <div><strong class="text-sm">${i.nome}</strong><p class="text-xs text-gray-400">${i.email}</p></div>
                            </div>
                        </td>
                        <td class="px-6 py-4"><span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-semibold">${i.plano}</span></td>
                        <td class="px-6 py-4 text-sm">${i.total_membros || 0}</td>
                        <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-semibold ${i.status==='ATIVO'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${i.status}</span></td>
                        <td class="px-6 py-4">
                            <div class="flex gap-2">
                                <button class="p-2 hover:bg-gray-100 rounded-lg" title="Editar"><i data-lucide="pencil" class="w-4 h-4 text-gray-500"></i></button>
                                <button class="p-2 hover:bg-gray-100 rounded-lg" title="Configurar"><i data-lucide="settings" class="w-4 h-4 text-gray-500"></i></button>
                            </div>
                        </td>
                    </tr>`;
                });
                document.getElementById('tabelaIgrejas').innerHTML = html || '<tr><td colspan="5" class="text-center py-8 text-gray-400">Nenhuma igreja</td></tr>';
                lucide.createIcons();
            } catch(e) {
                console.log('Erro:', e);
            }
        }
        
        function logout() {
            localStorage.removeItem('sa_token');
            window.location.href = 'login.html';
        }
        
        init();
    </script>
</body>
</html>
