<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - AASA Tecnologia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0a0a0f;
            overflow:hidden;
            position:relative;
        }
        .bg-glow{
            position:fixed;
            width:600px;height:600px;
            border-radius:50%;
            filter:blur(120px);
            opacity:.3;
            animation:float 8s ease-in-out infinite;
        }
       .bg-glow.g1{background:#1a237e;top:-200px;right:-100px}
.bg-glow.g2{background:#283593;bottom:-200px;left:-100px;animation-delay:-4s}animation-delay:-4s}
        @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,30px)}}
        
        .login-card{
            background:rgba(15,7,32,.9);
            backdrop-filter:blur(30px);
            border:1px solid rgba(99,102,241,.3);
            border-radius:28px;
            padding:50px 40px;
            width:90%;
            max-width:420px;
            box-shadow:0 0 60px rgba(99,102,241,.2),0 0 100px rgba(139,92,246,.1);
            position:relative;
            z-index:1;
        }
        .admin-badge{
            display:inline-block;
            background:linear-gradient(135deg,#6366f1,#8b5cf6);
            color:white;
            padding:6px 16px;
            border-radius:20px;
            font-size:11px;
            font-weight:700;
            letter-spacing:2px;
            margin-bottom:24px;
        }
        h1{color:white;font-size:24px;font-weight:800;margin-bottom:4px;text-align:center}
        .subtitle{color:rgba(255,255,255,.4);font-size:13px;text-align:center;margin-bottom:32px}
        
        .form-group{margin-bottom:18px}
        .form-group label{display:block;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
        .form-group input{
            width:100%;padding:15px 18px;
            background:rgba(255,255,255,.03);
            border:1px solid rgba(255,255,255,.1);
            border-radius:14px;color:white;
            font-size:14px;font-family:'Inter',sans-serif;
            transition:all .3s;
        }
        .form-group input:focus{
            outline:none;
            border-color:rgba(99,102,241,.5);
            box-shadow:0 10px 40px rgba(26,35,126,.4)
        }
        
        .btn{
            width:100%;padding:16px;
            background:linear-gradient(135deg,#1a237e,#283593);
            color:white;border:none;border-radius:14px;
            font-size:15px;font-weight:700;
            cursor:pointer;font-family:'Inter',sans-serif;
            margin-top:8px;transition:all .3s;
        }
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(99,102,241,.4)}
        .btn:disabled{opacity:.5;transform:none}
        
        .alert{
            padding:12px 16px;border-radius:12px;
            font-size:13px;font-weight:500;
            margin-bottom:16px;display:none;
        }
        .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
        .alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;display:block}
        
        .back-link{text-align:center;margin-top:20px}
        .back-link a{color:rgba(255,255,255,.3);font-size:13px;text-decoration:none}
        .back-link a:hover{color:#6366f1}
    </style>
</head>
<body>
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>
    
    <div class="login-card">
        <div style="text-align:center">
            <span class="admin-badge">👑 SUPER ADMIN</span>
        </div>
        <h1>AASA Tecnologia</h1>
        <p class="subtitle">Painel de Gerenciamento Global</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" value="admin@aasatecnologia.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" value="admin123" required>
            </div>
            <div id="msg" class="alert"></div>
            <button type="submit" class="btn" id="btn">🔐 Acessar Painel</button>
        </form>
        <div class="back-link">
            <a href="../login.html">← Login da Igreja</a>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3001/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.textContent = '⏳ Acessando...';
            msg.className = 'alert';
            
            try {
                const res = await fetch(API + '/auth/login/superadmin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        senha: document.getElementById('senha').value
                    })
                });
                const data = await res.json();
                
                if (res.ok && data.token) {
                    localStorage.setItem('sa_token', data.token);
                    localStorage.setItem('sa_usuario', JSON.stringify(data.usuario));
                    
                    msg.className = 'alert alert-success';
                    msg.textContent = '✅ Acesso concedido!';
                    setTimeout(() => window.location.href = 'index.html', 500);
                } else {
                    msg.className = 'alert alert-error';
                    msg.textContent = '❌ ' + (data.error || 'Credenciais inválidas');
                    btn.disabled = false;
                    btn.textContent = '🔐 Acessar Painel';
                }
            } catch (err) {
                msg.className = 'alert alert-error';
                msg.textContent = '❌ Erro de conexão';
                btn.disabled = false;
                btn.textContent = '🔐 Acessar Painel';
            }
        });
    </script>
</body>
</html>
