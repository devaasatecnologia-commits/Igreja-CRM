<button class="mobile-toggle" onclick="toggleSidebar()">

</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar-header">
        <img id="igrejaLogo" src="https://aasatecnologia.com.br/logo.png" class="sidebar-logo-img animate-pulse-gold" onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='flex';">
        <div id="fallbackLogo" class="sidebar-logo-fallback" style="display:none;"><i data-lucide="church" class="w-6 h-6"></i></div>
        <div class="sidebar-brand">
            <h3>AASA SAGRADO</h3>

    <nav class="sidebar-nav" id="sidebarNav">
        <div class="text-center py-8 text-gray-400 text-sm">Carregando módulos...</div>
    </nav>
    
    <div class="sidebar-footer">
        <div class="user-card" onclick="logout()">

            <div class="user-info">
                <strong id="userNome">Admin</strong>
